<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>NSS Invoice &amp; Quotation Maker</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --ink:#111111;
  --orange:#FF5A1F;
  --gray:#8a8a8a;
  --lightgray:#f2f2f2;
}
*{box-sizing:border-box;}
html,body{
  font-family:'Inter',sans-serif;
  background:#ffffff;
  color:var(--ink);
  -webkit-tap-highlight-color:transparent;
  overscroll-behavior-y:none;
}
body{
  padding-bottom:88px;
  max-width:560px;
  margin:0 auto;
  min-height:100vh;
}
.screen{display:none;}
.screen.active{display:block;}

.app-h1{
  font-size:1.9rem;
  font-weight:800;
  letter-spacing:0.02em;
  text-transform:uppercase;
  line-height:1.1;
}
.app-sub{
  font-size:0.72rem;
  letter-spacing:0.12em;
  color:var(--gray);
  text-transform:uppercase;
  font-weight:600;
  margin-top:2px;
}
.section-title{
  font-size:1.25rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.02em;
  margin-bottom:14px;
}
.field-label{
  font-size:0.68rem;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:#222;
  display:block;
  margin-bottom:6px;
}
.nss-input{
  width:100%;
  border:2px solid var(--ink);
  border-radius:0;
  padding:12px 14px;
  font-size:1rem;
  background:#fff;
  color:var(--ink);
  font-family:'Inter',sans-serif;
}
.nss-input::placeholder{color:#a3a3a3;}
.nss-input:focus{outline:none;border-color:var(--orange);}
textarea.nss-input{resize:none;}

.divider{
  border:none;
  border-top:3px solid var(--ink);
  margin:22px -20px;
}
.divider-thin{
  border:none;
  border-top:1px solid #000;
  margin:0 -20px;
}

.toggle-btn{
  border:2px solid var(--ink);
  background:#fff;
  color:var(--ink);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.04em;
  padding:16px 8px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  font-size:0.95rem;
}
.toggle-btn.active{
  background:var(--orange);
  border-color:var(--orange);
  color:#fff;
}

.btn-outline{
  border:2px solid var(--ink);
  background:#fff;
  color:var(--ink);
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.03em;
  padding:15px 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-outline:active{background:var(--lightgray);}
.btn-solid{
  border:2px solid var(--orange);
  background:var(--orange);
  color:#fff;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.03em;
  padding:15px 10px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-solid:active{background:#e34e16;}
.btn-solid:disabled{opacity:0.5;}

.item-card{
  border:2px solid var(--ink);
  padding:12px 14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}
.item-card .name{font-weight:700;font-size:0.95rem;}
.item-card .meta{font-size:0.78rem;color:#555;margin-top:2px;}
.item-card .total{font-weight:800;font-size:0.95rem;white-space:nowrap;}
.del-btn{color:#c0392b;background:#fde8e6;border:none;padding:8px 9px;font-size:0.85rem;}

.add-item-box{
  border:2px dashed #b8b8b8;
  padding:14px;
  margin-bottom:14px;
}

.totals-box{
  border:2px solid var(--ink);
  padding:14px 16px;
  margin-top:14px;
}
.totals-row{display:flex;justify-content:space-between;align-items:center;font-size:0.92rem;padding:5px 0;}
.totals-row.grand{border-top:2px solid var(--ink);margin-top:6px;padding-top:10px;font-size:1.1rem;font-weight:800;}
.totals-row.grand .amt{color:var(--orange);}

/* Bottom Nav */
.bottom-nav{
  position:fixed;
  bottom:0;left:0;right:0;
  max-width:560px;
  margin:0 auto;
  background:#fff;
  border-top:3px solid var(--ink);
  display:flex;
  align-items:stretch;
  z-index:50;
  padding:8px 14px calc(8px + env(safe-area-inset-bottom,0px));
}
.nav-btn{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4px;
  padding:8px 4px;
  background:none;
  border:none;
  color:#9b9b9b;
  font-size:0.62rem;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.05em;
  position:relative;
  border-radius:10px;
  transition:color .15s, background .15s;
}
.nav-btn .nav-icon-wrap{
  width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;
  border-radius:9px;
  transition:background .15s;
}
.nav-btn i{font-size:1.18rem;line-height:1;}
.nav-btn.active{color:var(--ink);}
.nav-btn.active .nav-icon-wrap{
  background:var(--orange);
  color:#fff;
}
.nav-btn.active i{color:#fff;}
.nav-btn:not(.active):active{background:var(--lightgray);}

/* History cards */
.hist-card{
  border:2px solid var(--ink);
  padding:14px;
  margin-bottom:12px;
}
.hist-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.hist-badge{
  font-size:0.62rem;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.06em;
  padding:3px 8px;
  border:1.5px solid var(--ink);
}
.hist-badge.invoice{background:var(--orange);border-color:var(--orange);color:#fff;}
.hist-num{font-weight:800;font-size:0.95rem;margin-top:6px;}
.hist-client{font-size:0.85rem;color:#444;margin-top:2px;}
.hist-meta{font-size:0.75rem;color:#888;margin-top:4px;}
.hist-amt{font-weight:800;font-size:1.05rem;}
.hist-actions{display:flex;gap:8px;margin-top:12px;}
.hist-actions button{
  flex:1;
  border:2px solid var(--ink);
  background:#fff;
  font-size:0.72rem;
  font-weight:700;
  text-transform:uppercase;
  padding:8px 4px;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.hist-actions button.danger{color:#c0392b;border-color:#c0392b;}
.hist-actions button.primary{background:var(--orange);border-color:var(--orange);color:#fff;}

.empty-state{
  text-align:center;
  padding:60px 20px;
  color:#999;
}
.empty-state i{font-size:2.6rem;margin-bottom:14px;display:block;color:#ccc;}

/* Toast */
#toast{
  position:fixed;
  bottom:90px;left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--ink);
  color:#fff;
  padding:11px 22px;
  font-size:0.85rem;
  font-weight:600;
  z-index:100;
  opacity:0;
  transition:opacity .25s, transform .25s;
  pointer-events:none;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ============ Minimal utility layer (replaces Tailwind CDN) ============ */
.flex{display:flex;}
.items-center{align-items:center;}
.justify-center{justify-content:center;}
.grid{display:grid;}
.grid-cols-2{grid-template-columns:1fr 1fr;}
.gap-2{gap:8px;}
.gap-3{gap:12px;}
.w-full{width:100%;}
.w-16{width:64px;}
.hidden{display:none !important;}
.font-bold{font-weight:700;}
.font-semibold{font-weight:600;}
.text-xs{font-size:0.72rem;}
.text-sm{font-size:0.85rem;}
.text-gray-400{color:#a3a3a3;}
.text-red-600{color:#c0392b;}
.px-2{padding-left:8px;padding-right:8px;}
.px-5{padding-left:20px;padding-right:20px;}
.py-1{padding-top:4px;padding-bottom:4px;}
.mt-1{margin-top:4px;}
.mt-2{margin-top:8px;}
.mt-3{margin-top:12px;}
.mb-3{margin-bottom:12px;}
.mb-4{margin-bottom:16px;}
.mb-5{margin-bottom:20px;}
.mb-6{margin-bottom:24px;}
.mb-8{margin-bottom:32px;}
.mb-10{margin-bottom:40px;}
.pt-5{padding-top:20px;}
.border-2{border-width:2px;border-style:solid;}
.border-black{border-color:#111111;}
.uppercase{text-transform:uppercase;}
/* ============ /utility layer ============ */

.settings-group{margin-bottom:22px;}
.settings-group .field-label{margin-top:14px;}
.settings-group .field-label:first-child{margin-top:0;}

.danger-zone{
  border:2px solid #c0392b;
  padding:16px;
  margin-top:10px;
}
.danger-btn{
  width:100%;
  border:2px solid #c0392b;
  background:#fff;
  color:#c0392b;
  font-weight:700;
  text-transform:uppercase;
  padding:13px;
  letter-spacing:0.03em;
}

.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.55);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:200;
}
.modal-overlay.hidden{display:none;}
.modal-sheet{
  background:#fff;
  width:100%;
  max-width:560px;
  border-top:3px solid var(--ink);
  padding:22px 20px 28px;
}
</style>
</head>
<body class="px-5 pt-5">

<!-- ===================== SCREEN: NEW / EDIT DOCUMENT ===================== -->
<section id="screen-newdoc" class="screen active">
  <h1 class="app-h1" id="docHeading">New Document</h1>
  <p class="app-sub" id="companySub">NETWORK SOLUTIONS SERVICES</p>
  <hr class="divider">

  <h2 class="section-title">Doc Type</h2>
  <div class="grid grid-cols-2 gap-3 mb-5">
    <button type="button" class="toggle-btn active" id="typeInvoiceBtn" onclick="setDocType('invoice')">
      <i class="fas fa-file-invoice"></i> Invoice
    </button>
    <button type="button" class="toggle-btn" id="typeQuoteBtn" onclick="setDocType('quotation')">
      <i class="fas fa-file-invoice"></i> Quotation
    </button>
  </div>

  <div class="grid grid-cols-2 gap-3">
    <div>
      <label class="field-label">Number</label>
      <input type="text" id="docNumber" class="nss-input">
    </div>
    <div>
      <label class="field-label">Date (YYYY-MM-DD)</label>
      <input type="date" id="docDate" class="nss-input">
      <p class="text-xs text-gray-400 mt-1" id="docDatePretty">&nbsp;</p>
    </div>
  </div>

  <hr class="divider">

  <h2 class="section-title">Client Info</h2>
  <div class="mb-4">
    <label class="field-label">Name</label>
    <input type="text" id="custName" class="nss-input" placeholder="Client name">
  </div>
  <div class="mb-4">
    <label class="field-label">Phone</label>
    <input type="tel" id="custPhone" class="nss-input" placeholder="Phone number">
  </div>
  <div>
    <label class="field-label">Address</label>
    <textarea id="custAddress" rows="3" class="nss-input" placeholder="Address"></textarea>
  </div>

  <hr class="divider">

  <h2 class="section-title">Line Items</h2>

  <div class="add-item-box">
    <label class="field-label">Quick select</label>
    <select id="presetSelect" class="nss-input mb-3" onchange="loadPreset()">
      <option value="">-- Choose a standard item --</option>
      <optgroup label="CP Plus Equipment">
        <option value="CP Plus 4CH NVR|5500">CP Plus 4CH NVR</option>
        <option value="CP Plus 4CH POE|5500">CP Plus 4 Port POE</option>
        <option value="CP Plus 8CH NVR|6500">CP Plus 8CH NVR</option>
        <option value="CP Plus 8CH POE|2500">CP Plus 8CH POE</option>
        <option value="CP Plus 4MP IP Dome Camera|4100">CP Plus 4MP IP Dome Camera</option>
        <option value="CP Plus 2MP IP Dome Camera|3500">CP Plus 2MP IP Dome Camera</option>
        <option value="CP Plus 2MP IP Bullet Camera|3600">CP Plus 2MP IP Bullet Camera</option>
        <option value="CP Plus 4MP IP Bullet Camera|4700">CP Plus 4MP IP Bullet Camera</option>
        <option value="Indian Assembling IP Camera|2800">Indian Assembling IP Camera</option>
        <option value="Dome camera|5000">Dome Camera</option>
      </optgroup>
      <optgroup label="Storage &amp; Networking">
        <option value="2TB HDD|5150">2TB HDD</option>
        <option value="1TB HDD|5150">1TB HDD</option>
        <option value="RJ45 Connectors|50">RJ45 Connectors</option>
        <option value="Cat 6 Cable (100m)|2400">Cat 6 Cable (100m)</option>
      </optgroup>
      <optgroup label="Piping, Boxes &amp; Labour">
        <option value="PVC Pipe Lines|60">PVC Pipe Lines</option>
        <option value="PVC Boxes|70">PVC Boxes</option>
        <option value="Miscellaneous (clips, screws, supporters)|250">Miscellaneous (clips, screws, supporters)</option>
        <option value="Service Charges (Per Point)|700">Service Charges (Per Point)</option>
      </optgroup>
    </select>

    <label class="field-label">Description</label>
    <input type="text" id="itemName" class="nss-input mb-3" placeholder="e.g. 2MP Dome Camera">

    <div class="grid grid-cols-2 gap-3 mb-3">
      <div>
        <label class="field-label">Qty</label>
        <input type="number" id="itemQty" value="1" min="1" class="nss-input">
      </div>
      <div>
        <label class="field-label">Price (₹)</label>
        <input type="number" id="itemPrice" class="nss-input" placeholder="0.00">
      </div>
    </div>
    <button type="button" class="btn-solid w-full" onclick="addItem()"><i class="fas fa-plus"></i> Add Item</button>
    <p id="itemError" class="text-xs text-red-600 font-semibold mt-2 hidden"></p>
  </div>

  <div id="itemsList"></div>

  <div class="totals-box">
    <div class="totals-row">
      <span>Subtotal</span>
      <span id="subtotalDisplay">₹0.00</span>
    </div>
    <div class="totals-row">
      <span class="flex items-center gap-2">Tax (%)
        <input type="number" id="taxRate" value="0" min="0" max="100" class="border-2 border-black w-16 px-2 py-1 text-sm" onchange="renderItems()">
      </span>
      <span id="taxDisplay">₹0.00</span>
    </div>
    <div class="totals-row grand">
      <span>Grand Total</span>
      <span class="amt" id="grandTotalDisplay">₹0.00</span>
    </div>
  </div>

  <hr class="divider">

  <div class="mb-4">
    <label class="field-label">Terms &amp; Conditions / Notes</label>
    <textarea id="docNotes" rows="5" class="nss-input"></textarea>
  </div>

  <hr class="divider-thin mb-5">

  <div class="grid grid-cols-2 gap-3 mb-8">
    <button type="button" class="btn-outline" onclick="saveDocument(true)"><i class="fas fa-save"></i> Save</button>
    <button type="button" class="btn-solid" onclick="generatePDF()"><i class="fas fa-file-pdf"></i> Generate PDF</button>
  </div>
</section>

<!-- ===================== SCREEN: HISTORY ===================== -->
<section id="screen-history" class="screen">
  <h1 class="app-h1">History</h1>
  <p class="app-sub">SAVED INVOICES &amp; QUOTATIONS</p>
  <hr class="divider">
  <input type="text" id="historySearch" class="nss-input mb-5" placeholder="Search by client name or number" oninput="renderHistory()">
  <div id="historyList"></div>
</section>

<!-- ===================== SCREEN: SETTINGS ===================== -->
<section id="screen-settings" class="screen">
  <h1 class="app-h1">Settings</h1>
  <p class="app-sub">COMPANY &amp; NUMBERING</p>
  <hr class="divider">

  <div class="settings-group">
    <h2 class="section-title" style="font-size:1rem;">Company Details</h2>
    <label class="field-label">Company Name</label>
    <input type="text" id="setCompanyName" class="nss-input">
    <label class="field-label">Tagline</label>
    <input type="text" id="setTagline" class="nss-input">
    <label class="field-label">Phone</label>
    <input type="text" id="setPhone" class="nss-input">
    <label class="field-label">Email</label>
    <input type="text" id="setEmail" class="nss-input">
  </div>

  <hr class="divider-thin mb-6">

  <div class="settings-group">
    <h2 class="section-title" style="font-size:1rem;">Document Numbering</h2>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="field-label">Invoice Prefix</label>
        <input type="text" id="setInvPrefix" class="nss-input">
      </div>
      <div>
        <label class="field-label">Next Invoice No.</label>
        <input type="number" id="setInvSeq" class="nss-input">
      </div>
    </div>
    <div class="grid grid-cols-2 gap-3 mt-3">
      <div>
        <label class="field-label">Quotation Prefix</label>
        <input type="text" id="setQuotePrefix" class="nss-input">
      </div>
      <div>
        <label class="field-label">Next Quotation No.</label>
        <input type="number" id="setQuoteSeq" class="nss-input">
      </div>
    </div>
  </div>

  <hr class="divider-thin mb-6">

  <div class="settings-group">
    <h2 class="section-title" style="font-size:1rem;">Default Terms &amp; Conditions</h2>
    <textarea id="setDefaultTerms" rows="5" class="nss-input"></textarea>
  </div>

  <button type="button" class="btn-solid w-full mb-8" onclick="saveSettings()"><i class="fas fa-check"></i> Save Settings</button>

  <div class="danger-zone mb-10">
    <p class="text-xs font-bold uppercase text-red-600 mb-3"><i class="fas fa-triangle-exclamation"></i> Danger Zone</p>
    <button type="button" class="danger-btn" onclick="confirmClearHistory()">Clear All History</button>
  </div>
</section>

<!-- ===================== BOTTOM NAV ===================== -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-newdoc" onclick="goNewDocument()">
    <span class="nav-icon-wrap"><i class="fas fa-file-circle-plus"></i></span><span>New Doc</span>
  </button>
  <button class="nav-btn" id="nav-history" onclick="switchScreen('history')">
    <span class="nav-icon-wrap"><i class="fas fa-clock-rotate-left"></i></span><span>History</span>
  </button>
  <button class="nav-btn" id="nav-settings" onclick="switchScreen('settings')">
    <span class="nav-icon-wrap"><i class="fas fa-gear"></i></span><span>Settings</span>
  </button>
</nav>

<!-- Toast -->
<div id="toast"></div>

<!-- Confirm Modal -->
<div id="confirmModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <p id="confirmText" class="text-sm font-semibold mb-5"></p>
    <div class="grid grid-cols-2 gap-3">
      <button class="btn-outline" onclick="closeConfirm()">Cancel</button>
      <button class="btn-solid" id="confirmActionBtn" style="background:#c0392b;border-color:#c0392b;">Delete</button>
    </div>
  </div>
</div>

<!-- PDF Ready / Share Sheet -->
<div id="pdfReadyModal" class="modal-overlay hidden">
  <div class="modal-sheet">
    <p class="section-title" style="font-size:1.05rem;margin-bottom:4px;"><i class="fas fa-circle-check" style="color:var(--orange);"></i> PDF Ready</p>
    <p class="text-sm" style="color:#666;margin-bottom:18px;" id="pdfReadyFileName">document.pdf</p>
    <div class="grid grid-cols-2 gap-3 mb-3">
      <button class="btn-solid" id="pdfShareBtn"><i class="fas fa-share-nodes"></i> Share</button>
      <button class="btn-outline" id="pdfDownloadBtn"><i class="fas fa-download"></i> Download</button>
    </div>
    <button class="btn-outline w-full" style="border-color:#ccc;color:#777;" onclick="closePdfReady()"><i class="fas fa-xmark"></i> Close</button>
  </div>
</div>

<script>
/* =========================================================
   EMBEDDED FONT (DejaVu Sans subset) - lets the PDF render the
   actual Rupee symbol (₹) correctly, since the built-in PDF

function drawDashedLine(pdf, x1, y1, x2, y2, dashLen, gapLen){
  const dx = x2 - x1, dy = y2 - y1;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist === 0) return;
  const ux = dx / dist, uy = dy / dist;
  let drawn = 0;
  let on = true;
  while(drawn < dist){
    const step = Math.min(on ? dashLen : gapLen, dist - drawn);
    if(on){
      const sx = x1 + ux*drawn, sy = y1 + uy*drawn;
      const ex = x1 + ux*(drawn+step), ey = y1 + uy*(drawn+step);
      pdf.line(sx, sy, ex, ey);
    }
    drawn += step;
    on = !on;
  }
}

   STORAGE KEYS
========================================================= */
const SETTINGS_KEY = 'nss_settings_v1';
const HISTORY_KEY  = 'nss_history_v1';

const DEFAULT_SETTINGS = {
  companyName: 'Network Solutions Services',
  tagline: 'INTER-COM | CC Camera Services | NETWORKING | IP-Configurations',
  phone: '9493337410',
  email: 'networksolutionserviceeng@gmail.com',
  invPrefix: 'NSS/INV',
  quotePrefix: 'NSS/QUO',
  invSeq: 1,
  quoteSeq: 1,
  defaultTerms: '1. 50% advance payment required along with work order.\n2. Warranty is 1 year for Camera & DVR/NVR, no warranty on cables/adapters.\n3. Physical damage or burning is not covered under warranty.\n4. Price validity is 15 days from this quotation.'
};

function loadSettings(){
  try{
    const raw = localStorage.getItem(SETTINGS_KEY);
    if(!raw) return {...DEFAULT_SETTINGS};
    return {...DEFAULT_SETTINGS, ...JSON.parse(raw)};
  }catch(e){ return {...DEFAULT_SETTINGS}; }
}
function persistSettings(s){
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}
function loadHistory(){
  try{
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  }catch(e){ return []; }
}
function persistHistory(h){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

/* =========================================================
   STATE
========================================================= */
let settings = loadSettings();
let history  = loadHistory();
let items = [];
let currentDocId = null; // null = unsaved new doc

/* =========================================================
   INIT
========================================================= */
document.addEventListener('DOMContentLoaded', () => {
  applySettingsToUI();
  startNewDocument();
  document.getElementById('docDate').addEventListener('change', updateDatePretty);
  ['itemName','itemQty','itemPrice'].forEach(id=>{
    document.getElementById(id).addEventListener('keypress', e=>{
      if(e.key === 'Enter'){ e.preventDefault(); addItem(); }
    });
  });
});

function applySettingsToUI(){
  document.getElementById('companySub').innerText = (settings.companyName || '').toUpperCase();
  document.getElementById('setCompanyName').value = settings.companyName;
  document.getElementById('setTagline').value = settings.tagline;
  document.getElementById('setPhone').value = settings.phone;
  document.getElementById('setEmail').value = settings.email;
  document.getElementById('setInvPrefix').value = settings.invPrefix;
  document.getElementById('setInvSeq').value = settings.invSeq;
  document.getElementById('setQuotePrefix').value = settings.quotePrefix;
  document.getElementById('setQuoteSeq').value = settings.quoteSeq;
  document.getElementById('setDefaultTerms').value = settings.defaultTerms;
}

/* =========================================================
   NAVIGATION
========================================================= */
function switchScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('nav-' + name).classList.add('active');
  if(name === 'history') renderHistory();
}

function goNewDocument(){
  startNewDocument();
  switchScreen('newdoc');
}

/* =========================================================
   DOCUMENT TYPE / FORM
========================================================= */
let currentType = 'invoice';

function setDocType(type){
  currentType = type;
  document.getElementById('typeInvoiceBtn').classList.toggle('active', type === 'invoice');
  document.getElementById('typeQuoteBtn').classList.toggle('active', type === 'quotation');
  if(currentDocId === null){
    document.getElementById('docNumber').value = nextNumberFor(type);
  }
}

function nextNumberFor(type){
  const d = document.getElementById('docDate').value ? new Date(document.getElementById('docDate').value) : new Date();
  const yy = String(d.getFullYear()).slice(-2);
  if(type === 'invoice'){
    return `${settings.invPrefix}/${String(settings.invSeq).padStart(3,'0')}/${yy}`;
  }else{
    return `${settings.quotePrefix}/${String(settings.quoteSeq).padStart(3,'0')}/${yy}`;
  }
}

function updateDatePretty(){
  const v = document.getElementById('docDate').value;
  const el = document.getElementById('docDatePretty');
  if(!v){ el.innerHTML = '&nbsp;'; return; }
  const d = new Date(v + 'T00:00:00');
  el.innerText = d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

function startNewDocument(){
  currentDocId = null;
  currentType = 'invoice';
  items = [];
  document.getElementById('docHeading').innerText = 'New Document';
  document.getElementById('typeInvoiceBtn').classList.add('active');
  document.getElementById('typeQuoteBtn').classList.remove('active');
  document.getElementById('docDate').valueAsDate = new Date();
  updateDatePretty();
  document.getElementById('docNumber').value = nextNumberFor('invoice');
  document.getElementById('custName').value = '';
  document.getElementById('custPhone').value = '';
  document.getElementById('custAddress').value = '';
  document.getElementById('docNotes').value = settings.defaultTerms;
  document.getElementById('taxRate').value = 0;
  document.getElementById('presetSelect').value = '';
  document.getElementById('itemName').value = '';
  document.getElementById('itemQty').value = 1;
  document.getElementById('itemPrice').value = '';
  hideItemError();
  renderItems();
}

/* =========================================================
   LINE ITEMS
========================================================= */
function loadPreset(){
  const sel = document.getElementById('presetSelect');
  if(!sel.value) return;
  const [name, price] = sel.value.split('|');
  document.getElementById('itemName').value = name;
  document.getElementById('itemPrice').value = price;
  document.getElementById('itemQty').value = 1;
  document.getElementById('itemQty').focus();
}

function showItemError(msg){
  const el = document.getElementById('itemError');
  el.innerText = msg;
  el.classList.remove('hidden');
  setTimeout(hideItemError, 2500);
}
function hideItemError(){
  document.getElementById('itemError').classList.add('hidden');
}

function addItem(){
  const name = document.getElementById('itemName').value.trim();
  const qty = parseFloat(document.getElementById('itemQty').value);
  const price = parseFloat(document.getElementById('itemPrice').value);

  if(!name) return showItemError('Please enter an item description.');
  if(isNaN(qty) || qty <= 0) return showItemError('Please enter a valid quantity.');
  if(isNaN(price) || price < 0) return showItemError('Please enter a valid price.');

  items.push({ name, qty, price, total: qty * price });

  document.getElementById('itemName').value = '';
  document.getElementById('itemQty').value = 1;
  document.getElementById('itemPrice').value = '';
  document.getElementById('presetSelect').value = '';
  renderItems();
}

function removeItem(idx){
  items.splice(idx, 1);
  renderItems();
}

function formatCurrency(amount){
  return new Intl.NumberFormat('en-IN', { style:'currency', currency:'INR', minimumFractionDigits:2 }).format(amount);
}

function renderItems(){
  const list = document.getElementById('itemsList');
  if(items.length === 0){
    list.innerHTML = `<div class="empty-state" style="padding:30px 10px;"><i class="fas fa-box-open"></i><p class="text-sm">No items added yet</p></div>`;
  }else{
    list.innerHTML = items.map((it, idx) => `
      <div class="item-card">
        <div>
          <div class="name">${escapeHtml(it.name)}</div>
          <div class="meta">${it.qty} &times; ${formatCurrency(it.price)}</div>
        </div>
        <div style="text-align:right;">
          <div class="total">${formatCurrency(it.total)}</div>
          <button class="del-btn mt-2" onclick="removeItem(${idx})"><i class="fas fa-trash-alt"></i></button>
        </div>
      </div>
    `).join('');
  }
  calcTotals();
}

function calcTotals(){
  const subtotal = items.reduce((s,i)=>s+i.total, 0);
  const taxRate = parseFloat(document.getElementById('taxRate').value) || 0;
  const taxAmt = subtotal * taxRate / 100;
  const grand = subtotal + taxAmt;
  document.getElementById('subtotalDisplay').innerText = formatCurrency(subtotal);
  document.getElementById('taxDisplay').innerText = formatCurrency(taxAmt);
  document.getElementById('grandTotalDisplay').innerText = formatCurrency(grand);
  return { subtotal, taxRate, taxAmt, grand };
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.innerText = str;
  return div.innerHTML;
}

/* =========================================================
   SAVE DOCUMENT (HISTORY)
========================================================= */
function buildDocObject(){
  const totals = calcTotals();
  return {
    id: currentDocId || ('doc_' + Date.now()),
    type: currentType,
    number: document.getElementById('docNumber').value.trim(),
    date: document.getElementById('docDate').value,
    client: {
      name: document.getElementById('custName').value.trim(),
      phone: document.getElementById('custPhone').value.trim(),
      address: document.getElementById('custAddress').value.trim()
    },
    items: JSON.parse(JSON.stringify(items)),
    taxRate: totals.taxRate,
    subtotal: totals.subtotal,
    grandTotal: totals.grand,
    notes: document.getElementById('docNotes').value,
    updatedAt: Date.now()
  };
}

function saveDocument(showFeedback){
  const doc = buildDocObject();
  if(!doc.client.name){
    showToast('Add a client name before saving');
    return null;
  }
  const existingIdx = history.findIndex(d => d.id === doc.id);
  const isNew = existingIdx === -1;
  if(isNew){
    doc.createdAt = Date.now();
    history.unshift(doc);
    // bump sequence numbers only for brand-new documents
    if(currentType === 'invoice') settings.invSeq += 1;
    else settings.quoteSeq += 1;
    persistSettings(settings);
  }else{
    doc.createdAt = history[existingIdx].createdAt;
    history[existingIdx] = doc;
  }
  currentDocId = doc.id;
  persistHistory(history);
  if(showFeedback) showToast('Saved to history');
  return doc;
}

/* =========================================================
   PDF GENERATION
========================================================= */
function generatePDF(){
  const doc = saveDocument(false);
  if(!doc){ return; }
  const pdf = buildPdf(doc);
  const fileName = (doc.number || 'document').replace(/[\/\\:]/g, '-') + '.pdf';
  openPdfReadySheet(pdf, fileName);
  showToast('PDF generated');
}

function openPdfReadySheet(pdf, fileName){
  document.getElementById('pdfReadyFileName').innerText = fileName;

  const shareBtn = document.getElementById('pdfShareBtn');
  const downloadBtn = document.getElementById('pdfDownloadBtn');
  const canTryShare = !!(navigator.canShare && navigator.share);
  shareBtn.style.display = canTryShare ? '' : 'none';

  shareBtn.onclick = async () => {
    try{
      const blob = pdf.output('blob');
      const file = new File([blob], fileName, { type:'application/pdf' });
      if(navigator.canShare({ files:[file] })){
        await navigator.share({ files:[file], title:fileName });
        closePdfReady();
        return;
      }
      throw new Error('share not supported for files');
    }catch(e){
      showToast('Sharing not supported on this device — downloading instead');
      pdf.save(fileName);
      closePdfReady();
    }
  };

  downloadBtn.onclick = () => {
    pdf.save(fileName);
    closePdfReady();
  };

  document.getElementById('pdfReadyModal').classList.remove('hidden');
}

function closePdfReady(){
  document.getElementById('pdfReadyModal').classList.add('hidden');
}

function buildPdf(doc){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ unit:'pt', format:'a4' });
  registerPdfFonts(pdf);
  const pageW = 595.28;
  const pageH = 841.89;
  const marginX = 50;
  const ORANGE = [255, 90, 31];
  const INK = [17, 17, 17];
  let y = 54;

  function rupee(amount){
    return '\u20B9' + new Intl.NumberFormat('en-IN', { minimumFractionDigits:2, maximumFractionDigits:2 }).format(amount);
  }
  function spaceOut(str){
    // adds light letter-spacing for header/title text (jsPDF has no charSpace text option)
    return str.split('').join('\u200a ').replace(/ {2,}/g, '  ');
  }

  /* ---------- HEADER ---------- */
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(19);
  pdf.setTextColor(...INK);
  pdf.text(spaceOut(settings.companyName.toUpperCase()), pageW/2, y, { align:'center' });

  y += 17;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(8);
  pdf.setTextColor(20);
  pdf.text(settings.tagline, pageW/2, y, { align:'center' });

  y += 14;
  pdf.setFontSize(8.5);
  const phoneLabel = 'Phone: ';
  const emailLabel = '   |   Email: ';
  pdf.setFont('DejaVuSans', 'bold');
  const wPhoneLabel = pdf.getTextWidth(phoneLabel);
  pdf.setFont('DejaVuSans', 'normal');
  const wPhoneVal = pdf.getTextWidth(settings.phone);
  pdf.setFont('DejaVuSans', 'bold');
  const wEmailLabel = pdf.getTextWidth(emailLabel);
  pdf.setFont('DejaVuSans', 'normal');
  const wEmailVal = pdf.getTextWidth(settings.email);
  const totalLineW = wPhoneLabel + wPhoneVal + wEmailLabel + wEmailVal;
  let lx = pageW/2 - totalLineW/2;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.text(phoneLabel, lx, y); lx += wPhoneLabel;
  pdf.setFont('DejaVuSans', 'normal');
  pdf.text(settings.phone, lx, y); lx += wPhoneVal;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.text(emailLabel, lx, y); lx += wEmailLabel;
  pdf.setFont('DejaVuSans', 'normal');
  pdf.text(settings.email, lx, y);

  y += 16;
  pdf.setDrawColor(...INK);
  pdf.setLineWidth(2);
  pdf.line(0, y, pageW, y);

  /* ---------- TITLE BOX (INVOICE / QUOTATION) ---------- */
  y += 26;
  const title = doc.type === 'invoice' ? 'INVOICE' : 'QUOTATION';
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(13);
  const titleSpaced = spaceOut(title);
  const titleTextW = pdf.getTextWidth(titleSpaced);
  const boxPadX = 16;
  const boxH = 22;
  const boxW = titleTextW + boxPadX*2;
  const boxX = pageW/2 - boxW/2;
  const boxY = y - boxH + 6;
  pdf.setDrawColor(...INK);
  pdf.setLineWidth(1.3);
  pdf.rect(boxX, boxY, boxW, boxH);
  pdf.setTextColor(...INK);
  pdf.text(titleSpaced, pageW/2, boxY + boxH/2 + 4.5, { align:'center' });

  /* ---------- THICK DIVIDER ---------- */
  y += 22;
  pdf.setLineWidth(2.2);
  pdf.line(0, y, pageW, y);

  /* ---------- BILL TO / DOC META ---------- */
  y += 22;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(9.5);
  pdf.setTextColor(...INK);
  pdf.text('BILL TO', marginX, y);

  // right side: "NO: <docnumber>" with NO bold, value normal
  pdf.setFont('DejaVuSans', 'bold');
  const noLabel = 'NO: ';
  const noLabelW = pdf.getTextWidth(noLabel);
  pdf.setFont('DejaVuSans', 'normal');
  const noValW = pdf.getTextWidth(doc.number || '-');
  let rx = pageW - marginX - noLabelW - noValW;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.text(noLabel, rx, y); rx += noLabelW;
  pdf.setFont('DejaVuSans', 'normal');
  pdf.text(doc.number || '-', rx, y);

  y += 13;
  pdf.setFont('DejaVuSans', 'normal');
  pdf.setFontSize(10);
  pdf.text(doc.client.name || '-', marginX, y);

  // right: "DATE: <date>"
  pdf.setFont('DejaVuSans', 'bold');
  const dateLabel = 'DATE: ';
  const dateLabelW = pdf.getTextWidth(dateLabel);
  const dateStr = doc.date ? new Date(doc.date + 'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '-';
  pdf.setFont('DejaVuSans', 'normal');
  const dateValW = pdf.getTextWidth(dateStr);
  let rx2 = pageW - marginX - dateLabelW - dateValW;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.text(dateLabel, rx2, y); rx2 += dateLabelW;
  pdf.setFont('DejaVuSans', 'normal');
  pdf.text(dateStr, rx2, y);

  if(doc.client.phone){
    y += 13;
    pdf.text(doc.client.phone, marginX, y);
  }
  if(doc.client.address){
    y += 13;
    const addrLines = pdf.splitTextToSize(doc.client.address, 280);
    pdf.text(addrLines, marginX, y);
    y += (addrLines.length - 1) * 12;
  }

  y += 24;

  /* ---------- ITEMS TABLE ---------- */
  const colSnoW = 50;
  const colQtyW = 90;
  const colUnitW = 130;
  const colTotalW = 130;
  const tableW = pageW - marginX*2;
  const colDescW = tableW - colSnoW - colQtyW - colUnitW - colTotalW;
  const colX = {
    sno: marginX,
    desc: marginX + colSnoW,
    qtyRight: marginX + colSnoW + colDescW + colQtyW,
    unitRight: marginX + colSnoW + colDescW + colQtyW + colUnitW,
    totalRight: pageW - marginX
  };
  const qtyCenter = marginX + colSnoW + colDescW + colQtyW/2;

  const tableTop = y;
  const headerH = 26;

  pdf.setFillColor(...INK);
  pdf.rect(marginX, y, tableW, headerH, 'F');
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(8.5);
  pdf.setTextColor(255,255,255);
  pdf.text('S.NO', colX.sno + 14, y + headerH/2 + 3, { align:'center' });
  pdf.text('DESCRIPTION', colX.desc, y + headerH/2 + 3);
  pdf.text('QTY', qtyCenter, y + headerH/2 + 3, { align:'center' });
  pdf.text('UNIT (INR)', colX.unitRight, y + headerH/2 + 3, { align:'right' });
  pdf.text('TOTAL (INR)', colX.totalRight, y + headerH/2 + 3, { align:'right' });
  y += headerH;

  pdf.setFont('DejaVuSans', 'normal');
  pdf.setFontSize(9.5);

  if(doc.items.length === 0){
    pdf.setTextColor(140);
    pdf.text('No items added.', marginX + tableW/2, y + 22, { align:'center' });
    y += 32;
  }else{
    doc.items.forEach((item, idx) => {
      const descLines = pdf.splitTextToSize(item.name, colDescW - 16);
      const rowH = Math.max(30, 14*descLines.length + 14);
      if(y + rowH > pageH - 90){
        pdf.addPage();
        y = 56;
      }
      const midY = y + rowH/2 + 3;
      pdf.setFont('DejaVuSans', 'normal');
      pdf.setTextColor(...INK);
      pdf.text(String(idx+1), colX.sno + 14, midY, { align:'center' });
      pdf.text(descLines, colX.desc, y + rowH/2 - (descLines.length-1)*6 + 3);
      pdf.text(String(item.qty), qtyCenter, midY, { align:'center' });
      pdf.text(rupee(item.price), colX.unitRight, midY, { align:'right' });
      pdf.setFont('DejaVuSans', 'bold');
      pdf.text(rupee(item.total), colX.totalRight, midY, { align:'right' });
      pdf.setDrawColor(225);
      pdf.setLineWidth(0.6);
      pdf.line(marginX, y + rowH, marginX + tableW, y + rowH);
      y += rowH;
    });
  }

  pdf.setDrawColor(...INK);
  pdf.setLineWidth(1.4);
  pdf.rect(marginX, tableTop, tableW, y - tableTop);

  /* ---------- TOTALS BOX ---------- */
  y += 26;
  const totalsBoxW = 230;
  const totalsBoxX = pageW - marginX - totalsBoxW;
  const rowHt = 26;
  let extraRows = 0;
  if(doc.taxRate > 0) extraRows += 1;
  const totalsBoxH = rowHt * (2 + extraRows);
  const totalsTop = y;

  pdf.setLineWidth(1.4);
  pdf.setDrawColor(...INK);
  pdf.rect(totalsBoxX, totalsTop, totalsBoxW, totalsBoxH);

  let ty = totalsTop;

  // Subtotal row
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(9.5);
  pdf.setTextColor(...INK);
  pdf.text('Subtotal', totalsBoxX + 12, ty + rowHt/2 + 3.5);
  pdf.setFont('DejaVuSans', 'normal');
  pdf.text(rupee(doc.subtotal), pageW - marginX - 12, ty + rowHt/2 + 3.5, { align:'right' });
  ty += rowHt;
  pdf.setLineWidth(0.7);
  pdf.setDrawColor(...INK);
  pdf.line(totalsBoxX, ty, totalsBoxX + totalsBoxW, ty);

  if(doc.taxRate > 0){
    const taxAmt = doc.subtotal * doc.taxRate / 100;
    pdf.setFont('DejaVuSans', 'bold');
    pdf.text(`Tax (${doc.taxRate}%)`, totalsBoxX + 12, ty + rowHt/2 + 3.5);
    pdf.setFont('DejaVuSans', 'normal');
    pdf.text(rupee(taxAmt), pageW - marginX - 12, ty + rowHt/2 + 3.5, { align:'right' });
    ty += rowHt;
    pdf.setLineWidth(0.7);
    pdf.line(totalsBoxX, ty, totalsBoxX + totalsBoxW, ty);
  }

  // Grand total row (orange fill)
  pdf.setFillColor(...ORANGE);
  pdf.rect(totalsBoxX, ty, totalsBoxW, rowHt, 'F');
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(10.5);
  pdf.setTextColor(255,255,255);
  pdf.text('GRAND TOTAL', totalsBoxX + 12, ty + rowHt/2 + 4);
  pdf.text(rupee(doc.grandTotal), pageW - marginX - 12, ty + rowHt/2 + 4, { align:'right' });

  pdf.setDrawColor(...INK);
  pdf.setLineWidth(1.4);
  pdf.rect(totalsBoxX, totalsTop, totalsBoxW, totalsBoxH);
  // vertical divider between label and amount, matching sample
  pdf.setLineWidth(0.7);
  pdf.line(totalsBoxX + totalsBoxW - 95, totalsTop, totalsBoxX + totalsBoxW - 95, totalsTop + totalsBoxH);

  y = totalsTop + totalsBoxH + 34;
  if(y > pageH - 140){ pdf.addPage(); y = 60; }

  /* ---------- DASHED SEPARATOR ---------- */
  pdf.setDrawColor(150);
  pdf.setLineWidth(0.8);
  drawDashedLine(pdf, marginX, y, pageW - marginX, y, 4, 3);

  /* ---------- TERMS & CONDITIONS ---------- */
  y += 22;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(9.5);
  pdf.setTextColor(...INK);
  pdf.text('TERMS & CONDITIONS', marginX, y);
  y += 15;
  pdf.setFont('DejaVuSans', 'normal');
  pdf.setFontSize(8.8);
  pdf.setTextColor(40);
  const notesLines = (doc.notes || '').split('\n').filter(l => l.trim() !== '');
  notesLines.forEach(line => {
    const wrapped = pdf.splitTextToSize(line, tableW);
    if(y + wrapped.length*11 > pageH - 90){ pdf.addPage(); y = 56; }
    pdf.text(wrapped, marginX, y);
    y += wrapped.length * 11 + 3;
  });

  /* ---------- FOOTER: CONDITIONS APPLIED / AUTHORIZED BY ---------- */
  let footerY = pageH - 78;
  if(y > footerY - 20){ footerY = y + 50; }
  if(footerY > pageH - 40){ pdf.addPage(); footerY = 120; }

  pdf.setFont('DejaVuSans', 'normal');
  pdf.setFontSize(9.5);
  pdf.setTextColor(60);
  pdf.text('Conditions applied', marginX, footerY);
  pdf.text('Authorized by:', pageW - marginX, footerY, { align:'right' });

  let fy = footerY + 24;
  pdf.setFont('DejaVuSans', 'bold');
  pdf.setFontSize(10.5);
  pdf.setTextColor(...INK);
  pdf.text(settings.companyName, pageW - marginX, fy, { align:'right' });
  fy += 13;
  pdf.setFont('DejaVuSans', 'normal');
  pdf.setFontSize(9);
  pdf.setTextColor(60);
  pdf.text(settings.phone, pageW - marginX, fy, { align:'right' });
  fy += 12;
  pdf.text(settings.email, pageW - marginX, fy, { align:'right' });

  return pdf;
}

/* =========================================================
   HISTORY SCREEN
========================================================= */
function renderHistory(){
  const list = document.getElementById('historyList');
  const q = (document.getElementById('historySearch').value || '').toLowerCase().trim();
  let data = history;
  if(q){
    data = history.filter(d =>
      (d.client.name || '').toLowerCase().includes(q) ||
      (d.number || '').toLowerCase().includes(q)
    );
  }
  if(data.length === 0){
    list.innerHTML = `<div class="empty-state"><i class="fas fa-clock-rotate-left"></i><p>No saved documents yet</p></div>`;
    return;
  }
  list.innerHTML = data.map(d => {
    const dateStr = d.date ? new Date(d.date + 'T00:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}) : '-';
    return `
    <div class="hist-card">
      <div class="hist-top">
        <div>
          <span class="hist-badge ${d.type === 'invoice' ? 'invoice' : ''}">${d.type === 'invoice' ? 'Invoice' : 'Quotation'}</span>
          <div class="hist-num">${escapeHtml(d.number || '-')}</div>
          <div class="hist-client">${escapeHtml(d.client.name || 'No name')}</div>
          <div class="hist-meta">${dateStr} &middot; ${d.items.length} item${d.items.length===1?'':'s'}</div>
        </div>
        <div class="hist-amt">${formatCurrency(d.grandTotal || 0)}</div>
      </div>
      <div class="hist-actions">
        <button onclick="openHistoryDoc('${d.id}')"><i class="fas fa-pen"></i> Edit</button>
        <button class="primary" onclick="redownloadPdf('${d.id}')"><i class="fas fa-file-pdf"></i> PDF</button>
        <button class="danger" onclick="askDeleteHistory('${d.id}')"><i class="fas fa-trash-alt"></i></button>
      </div>
    </div>`;
  }).join('');
}

function openHistoryDoc(id){
  const d = history.find(x => x.id === id);
  if(!d) return;
  currentDocId = d.id;
  currentType = d.type;
  items = JSON.parse(JSON.stringify(d.items));
  document.getElementById('docHeading').innerText = 'Edit Document';
  document.getElementById('typeInvoiceBtn').classList.toggle('active', d.type === 'invoice');
  document.getElementById('typeQuoteBtn').classList.toggle('active', d.type === 'quotation');
  if(d.date) document.getElementById('docDate').value = d.date;
  updateDatePretty();
  document.getElementById('docNumber').value = d.number || '';
  document.getElementById('custName').value = d.client.name || '';
  document.getElementById('custPhone').value = d.client.phone || '';
  document.getElementById('custAddress').value = d.client.address || '';
  document.getElementById('docNotes').value = d.notes || '';
  document.getElementById('taxRate').value = d.taxRate || 0;
  renderItems();
  switchScreen('newdoc');
}

function redownloadPdf(id){
  const d = history.find(x => x.id === id);
  if(!d) return;
  const pdf = buildPdf(d);
  const fileName = (d.number || 'document').replace(/[\/\\:]/g, '-') + '.pdf';
  openPdfReadySheet(pdf, fileName);
  showToast('PDF generated');
}

let pendingDeleteId = null;
function askDeleteHistory(id){
  pendingDeleteId = id;
  document.getElementById('confirmText').innerText = 'Delete this document from history? This cannot be undone.';
  document.getElementById('confirmActionBtn').onclick = () => {
    history = history.filter(x => x.id !== id);
    persistHistory(history);
    closeConfirm();
    renderHistory();
    showToast('Deleted');
  };
  document.getElementById('confirmModal').classList.remove('hidden');
}

function confirmClearHistory(){
  document.getElementById('confirmText').innerText = 'Clear ALL saved history? This cannot be undone.';
  document.getElementById('confirmActionBtn').onclick = () => {
    history = [];
    persistHistory(history);
    closeConfirm();
    showToast('History cleared');
  };
  document.getElementById('confirmModal').classList.remove('hidden');
}

function closeConfirm(){
  document.getElementById('confirmModal').classList.add('hidden');
}

/* =========================================================
   SETTINGS SCREEN
========================================================= */
function saveSettings(){
  settings.companyName = document.getElementById('setCompanyName').value.trim() || DEFAULT_SETTINGS.companyName;
  settings.tagline = document.getElementById('setTagline').value.trim();
  settings.phone = document.getElementById('setPhone').value.trim();
  settings.email = document.getElementById('setEmail').value.trim();
  settings.invPrefix = document.getElementById('setInvPrefix').value.trim() || DEFAULT_SETTINGS.invPrefix;
  settings.quotePrefix = document.getElementById('setQuotePrefix').value.trim() || DEFAULT_SETTINGS.quotePrefix;
  settings.invSeq = parseInt(document.getElementById('setInvSeq').value) || 1;
  settings.quoteSeq = parseInt(document.getElementById('setQuoteSeq').value) || 1;
  settings.defaultTerms = document.getElementById('setDefaultTerms').value;
  persistSettings(settings);
  document.getElementById('companySub').innerText = settings.companyName.toUpperCase();
  showToast('Settings saved');
}

/* =========================================================
   TOAST
========================================================= */
let toastTimer = null;
function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('show'), 2200);
}
